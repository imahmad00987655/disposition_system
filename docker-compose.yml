version: '3.8'

services:
  # Next.js Application
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: disposition-system-nextjs
    ports:
      - "6126:6126"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # API Configuration - Update these with your server IPs
      - NEXT_PUBLIC_API_BASE_URL=http://192.168.1.209/Disposition-system/
      - NEXT_PUBLIC_COMPLAINTS_API=http://192.168.1.209:6004/callcenterreportdata
      - NEXT_PUBLIC_ORDERS_API=http://192.168.1.209:5125/api_data
    restart: unless-stopped
    networks:
      - disposition-network
    volumes:
      # Mount PHP files if needed (optional)
      - ./:/app/php:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6126"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  disposition-network:
    driver: bridge

